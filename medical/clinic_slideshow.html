<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Slideshow - Mohannad Medical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .slideshow-container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .slide {
            display: none;
            width: 100%;
            height: 720px;
            animation: fadeIn 1s;
        }
        .slide.active {
            display: block;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background: rgba(102, 126, 234, 1);
        }
        .slide-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <div class="slide active">
            <img src="../temp_images/frame_000.png" alt="Slide 1">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_001.png" alt="Slide 2">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_002.png" alt="Slide 3">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_003.png" alt="Slide 4">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_004.png" alt="Slide 5">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_005.png" alt="Slide 6">
        </div>
        <div class="slide">
            <img src="../temp_images/frame_006.png" alt="Slide 7">
        </div>

        <div class="slide-counter">
            <span id="current">1</span> / <span id="total">7</span>
        </div>

        <div class="controls">
            <button onclick="previousSlide()">← Previous</button>
            <button id="playBtn" onclick="togglePlay()">▶ Play</button>
            <button onclick="nextSlide()">Next →</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        let isPlaying = false;
        let playInterval;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = 0;
            if (n < 0) currentSlide = totalSlides - 1;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('current').textContent = currentSlide + 1;
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }

        function previousSlide() {
            currentSlide--;
            showSlide(currentSlide);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');

            if (isPlaying) {
                btn.textContent = '⏸ Pause';
                playInterval = setInterval(() => {
                    nextSlide();
                }, 2000); // Change slide every 2 seconds
            } else {
                btn.textContent = '▶ Play';
                clearInterval(playInterval);
            }
        }

        // Initialize
        document.getElementById('total').textContent = totalSlides;
        showSlide(0);

        // Auto-play on load
        setTimeout(() => {
            togglePlay();
        }, 1000);
    </script>
</body>
</html>
